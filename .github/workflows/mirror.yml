name: Mirror to Gitee & Gitcode

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror Code
    runs-on: ubuntu-latest
    if: github.repository == 'qinshihu/itops-agent-platform'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitee
        run: |
          git remote set-url origin https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/IT_Oline/itops-agent-platform.git
          git push --mirror --force
        continue-on-error: true

      - name: Mirror to Gitcode
        run: |
          git remote set-url origin https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/gcw_IM7aAihp/itops-agent-platform.git
          git push --mirror --force
        continue-on-error: true

      - name: Mirror tags to Gitee
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git remote set-url origin https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/IT_Oline/itops-agent-platform.git
          git push --tags --force
        continue-on-error: true

      - name: Mirror tags to Gitcode
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git remote set-url origin https://${{ secrets.GITCODE_USERNAME }}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/gcw_IM7aAihp/itops-agent-platform.git
          git push --tags --force
        continue-on-error: true
